# =============================================================
# 每日数据更新配置
# 修改后执行 bash scripts/install_cron.sh 重新安装定时任务
# =============================================================

# ------------------------------------------------------------
# 全局设置
# ------------------------------------------------------------
global:
  # 项目根目录（绝对路径，必须修改为实际部署路径）
  project_root: /home/user/stock

  # Python 解释器路径（建议使用虚拟环境绝对路径）
  # 示例: /home/user/stock/.venv/bin/python
  python: python3

  # 日志目录（相对于 project_root 或绝对路径）
  log_dir: logs/daily_update

  # 可选：环境变量文件路径（.env 格式，每行 KEY=VALUE）
  # 用于覆盖 TUSHARE_TOKEN、DB_HOST 等敏感配置
  # env_file: /etc/stock/stock.env


# ------------------------------------------------------------
# 执行阶段定义
#
# 规则：
#   - 同一 stage 内的 tasks 并行执行
#   - stages 之间按列表顺序串行执行（保证依赖）
#   - cron 字段控制每个 stage 的独立调度时间（周一至周五）
#   - only_on 控制触发条件（不填=每天都跑）
#
# only_on 可用值：
#   weekday       周一到周五（工作日）
#   friday        每周五
#   month_early   每月 1~5 日
#   month_last    每月最后 5 天（粗略覆盖月末交易日）
#
# cmd 占位符（自动替换为当日对应日期字符串）：
#   {today}         当日 YYYYMMDD
#   {yesterday}     昨日 YYYYMMDD
#   {week_monday}   本周一 YYYYMMDD
#   {month_start}   本月第一天 YYYYMMDD
#   {current_month} 当前月 YYYYMM
# ------------------------------------------------------------

stages:

  # ----------------------------------------------------------
  # 阶段 1：基础列表（无依赖，最先跑）
  #   stock_basic  和 index_basic 并行执行，约 30~60 秒
  #   cron: 周一至周五 19:00
  # ----------------------------------------------------------
  - name: 基础列表
    cron: "0 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: stock_basic
        cmd: ["--table", "stock_basic"]

      - name: index_basic
        cmd: ["--table", "index_basic"]


  # ----------------------------------------------------------
  # 阶段 2：日线行情（依赖阶段 1 完成，全部并行）
  #   6 个任务同时拉取，完成时间取决于最慢的任务
  #
  #   ⚠️ stock_daily 说明：
  #     当不指定 --code 时，会对 stock_basic 中所有股票
  #     逐只发起请求（约 5000 次 API 调用），耗时较长。
  #     若只需跟踪自选股，可改为：
  #       cmd: ["--table", "stock_daily", "--start", "{today}",
  #             "--end", "{today}", "--code", "000001.SZ", "600519.SH"]
  #
  #   cron: 周一至周五 19:10（留 10 分钟等阶段 1 完成）
  # ----------------------------------------------------------
  - name: 日线行情
    cron: "10 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: index_daily
        cmd: ["--table", "index_daily", "--start", "{date_start}", "--end", "{today}"]

      - name: stock_daily_basic
        cmd: ["--table", "stock_daily_basic", "--date", "{today}"]

      # ↓ 全市场日线，较慢；如只跟踪自选股请修改 cmd 添加 --code 参数
      - name: stock_daily
        cmd: ["--table", "stock_daily", "--start", "{date_start}", "--end", "{today}"]

      - name: moneyflow_dc
        cmd: ["--table", "moneyflow_dc", "--start", "{date_start}", "--end", "{today}"]

      - name: moneyflow_ind_dc
        cmd: ["--table", "moneyflow_ind_dc", "--start", "{date_start}", "--end", "{today}"]

      - name: moneyflow_mkt_dc
        cmd: ["--table", "moneyflow_mkt_dc", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 3：周线行情（仅周五执行）
  #   拉取本周（周一→今日）的周线数据
  #   cron: 每周五 19:00（与阶段 1 同时开始，数据独立不冲突）
  # ----------------------------------------------------------
  - name: 周线行情
    cron: "0 19 * * 5"
    only_on: [friday]
    tasks:
      - name: stock_weekly
        cmd: ["--table", "stock_weekly", "--start", "{week_monday}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 4：月线行情（仅月末最后 5 天执行）
  #   拉取本月（月初→今日）的月线数据
  #   cron: 每天 20:00（only_on 控制仅月末生效）
  # ----------------------------------------------------------
  - name: 月线行情
    cron: "0 20 * * 1-5"
    only_on: [month_last]
    tasks:
      - name: stock_monthly
        cmd: ["--table", "stock_monthly", "--start", "{month_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 5：券商金股（仅每月 1~5 日执行）
  #   数据一般于每月 1~3 日更新
  #   cron: 每天 21:00（only_on 控制仅月初生效）
  # ----------------------------------------------------------
  - name: 券商金股
    cron: "0 21 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: broker_recommend
        cmd: ["--table", "broker_recommend", "--month", "{current_month}"]


  # ----------------------------------------------------------
  # 阶段 6：申万行业分类（每月初更新，约季度/年度调整）
  #   拉取申万2021版 L1/L2/L3 行业分类基础信息
  #   ⚠️ 须先于申万行业成分执行（sw_industry_member 依赖此表）
  #   cron: 每月 1~5 日 19:30（与券商金股阶段错开，月初一并更新）
  # ----------------------------------------------------------
  - name: 申万行业分类
    cron: "30 19 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: sw_industry
        cmd: ["--table", "sw_industry", "--sw-src", "SW2021"]


  # ----------------------------------------------------------
  # 阶段 7：申万行业成分（每月初更新，依赖阶段 6 完成）
  #   按 L3 代码逐一拉取申万2021版全部成分股（含历史变更记录）
  #   约需 5~10 分钟（346 个 L3 × API 调用）
  #   cron: 每月 1~5 日 20:00（阶段 6 完成后，预留 30 分钟）
  # ----------------------------------------------------------
  - name: 申万行业成分
    cron: "0 20 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: sw_industry_member
        cmd: ["--table", "sw_industry_member", "--sw-src", "SW2021"]


  # ----------------------------------------------------------
  # 阶段 8：申万行业日线（每个交易日更新）
  #   拉取当日全部申万行业指数行情（约 439 条，1次API调用）
  #   含 PE / PB / 流通市值 / 总市值 / 权重 等估值指标
  #   ⚠️ 依赖阶段 6（行业分类）已有数据；日线本身无代码依赖
  #   cron: 周一至周五 19:15（略晚于日线行情，确保交易所数据已入库）
  #
  #   手动补拉历史：在监控页指定起止日期后点「手动执行」
  #     - 指定日期区间：将逐日调用 API（适合补少量缺失日期）
  #     - 若需全量历史回填，请直接运行：
  #       python pipeline.py --table sw_industry_daily --backfill
  # ----------------------------------------------------------
  - name: 申万行业日线
    cron: "15 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: sw_industry_daily
        cmd: ["--table", "sw_industry_daily", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 9：中信行业成分（每月初更新）
  #   全量分页拉取全部中信行业成分（无需提前建分类表）
  #   约需 1~2 分钟（2~5 次 API 调用，单次 5000 行上限）
  #   ⚠️ 须先于中信行业日线回填执行（日线回填需从本表取行业代码）
  #   cron: 每月 1~5 日 20:30（错开申万行业成分的 20:00）
  # ----------------------------------------------------------
  - name: 中信行业成分
    cron: "30 20 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: ci_industry_member
        cmd: ["--table", "ci_industry_member"]


  # ----------------------------------------------------------
  # 阶段 10：中信行业日线（每个交易日更新）
  #   拉取当日全部中信行业指数行情（约 440 条，1次API调用）
  #   ⚠️ 依赖阶段 9（中信行业成分）已有数据（历史回填时需要代码列表）
  #   cron: 周一至周五 19:20（紧随申万行业日线 19:15）
  #
  #   手动补拉历史：在监控页指定起止日期后点「手动执行」
  #     - 指定日期区间：将逐日调用 API（适合补少量缺失日期）
  #     - 若需全量历史回填，请直接运行：
  #       python pipeline.py --table ci_industry_daily --backfill
  # ----------------------------------------------------------
  - name: 中信行业日线
    cron: "20 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: ci_industry_daily
        cmd: ["--table", "ci_industry_daily", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 11：同花顺板块基础信息（每月初更新）
  #   遍历所有板块类型（行业/概念/特色/其他/大盘），分页拉取
  #   约需 1~2 分钟（按类型分批，约 10~20 次 API 调用）
  #   ⚠️ 须先于同花顺成分执行（ths_member 依赖本表的板块代码）
  #   cron: 每月 1~5 日 21:00（错开申万/中信的 19:30~20:30）
  # ----------------------------------------------------------
  - name: 同花顺板块基础信息
    cron: "0 21 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: ths_index
        cmd: ["--table", "ths_index"]


  # ----------------------------------------------------------
  # 阶段 12：同花顺板块成分股（每月初更新，依赖阶段 11 完成）
  #   按板块代码逐一拉取全量成分股（板块数量 × API 调用）
  #   约需 10~30 分钟（板块数量较多）
  #   cron: 每月 1~5 日 21:30（阶段 11 完成后，预留 30 分钟）
  # ----------------------------------------------------------
  - name: 同花顺板块成分股
    cron: "30 21 * * 1-5"
    only_on: [month_early]
    tasks:
      - name: ths_member
        cmd: ["--table", "ths_member"]


  # ----------------------------------------------------------
  # 阶段 13：同花顺板块日线（每个交易日更新）
  #   拉取当日全部板块指数行情（1次API调用）
  #   含换手率、总/流通市值、上涨/下跌家数等指标
  #   ⚠️ 依赖阶段 11（板块基础信息）已有数据（历史回填需要代码列表）
  #   cron: 周一至周五 19:25（紧随中信行业日线 19:20）
  #
  #   手动补拉历史：在监控页指定起止日期后点「手动执行」
  #     - 指定日期区间：将逐日调用 API（适合补少量缺失日期）
  #     - 若需全量历史回填，请直接运行：
  #       python pipeline.py --table ths_daily --backfill
  # ----------------------------------------------------------
  - name: 同花顺板块日线
    cron: "25 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: ths_daily
        cmd: ["--table", "ths_daily", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 14：东方财富板块快照（每个交易日更新）
  #   拉取当日全部板块行业/概念/地域三类快照数据
  #   含领涨股、涨跌幅、总市值、换手率、上涨/下降家数等指标
  #   限量: 单次最大 5000 条，自动遍历三种 idx_type
  #   所需积分: 6000
  #   cron: 周一至周五 19:30（紧随同花顺板块日线）
  #
  #   手动补拉历史：在监控页指定起止日期后点「手动执行」
  # ----------------------------------------------------------
  - name: 东财板块快照
    cron: "30 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: dc_index
        cmd: ["--table", "dc_index", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 15：东方财富板块成分股（每个交易日更新）
  #   拉取当日全量板块成分快照，记录成分变动历史
  #   ⚠️ 全量数据量较大（所有板块×成分数），仅拉当日
  #   所需积分: 6000
  #   cron: 周一至周五 19:35（阶段 14 之后）
  # ----------------------------------------------------------
  - name: 东财板块成分股
    cron: "35 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: dc_member
        cmd: ["--table", "dc_member", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 16：东方财富板块行情（每个交易日更新）
  #   拉取当日全部板块 OHLC 行情数据（开高低收、成交量/额、振幅、换手率）
  #   历史数据起始于 2020 年，限量单次 2000 条
  #   所需积分: 6000
  #   cron: 周一至周五 19:35（与成分股同时，数据独立不冲突）
  #
  #   手动补拉历史：在监控页指定起止日期后点「手动执行」
  #     - 指定日期区间：将逐日调用 API（适合补少量缺失日期）
  #     - 若需全量历史回填，请直接运行：
  #       python pipeline.py --table dc_daily --backfill --start 20200101
  # ----------------------------------------------------------
  - name: 东财板块行情
    cron: "35 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: dc_daily
        cmd: ["--table", "dc_daily", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 17：同花顺涨跌停榜单（每个交易日更新）
  #   依次拉取 5 种类型：涨停池、连板池、冲刺涨停、炸板池、跌停池
  #   每种类型一次 API 调用，共 5 次（单次最大 4000 条）
  #   历史数据从 20231101 开始提供
  #   所需积分: 8000
  #   cron: 周一至周五 19:40（紧随东财板块行情）
  # ----------------------------------------------------------
  - name: 涨跌停榜单
    cron: "40 19 * * 1-5"
    only_on: [weekday]
    limit_type_options:
      - 涨停池
      - 连板池
      - 冲刺涨停
      - 炸板池
      - 跌停池
    tasks:
      - name: limit_list_ths
        cmd: ["--table", "limit_list_ths", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 18：开盘啦涨跌停榜单（每个交易日更新）
  #   依次拉取 5 种 tag：涨停、炸板、跌停、自然涨停、竞价
  #   每种 tag 按分批策略（涨停/跌停 15 天/批，其余 30 天/批）
  #   ⚠️ 数据更新时间为次日 8:30，晚间 pipeline 拉到的是昨日及之前数据
  #     若需当日数据，可另行设置次日早上的 cron（如 9:00）
  #   所需积分: 8000
  #   cron: 周一至周五 19:45（紧随同花顺涨跌停榜单）
  # ----------------------------------------------------------
  - name: 开盘啦榜单
    cron: "45 19 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: kpl_list
        cmd: ["--table", "kpl_list", "--start", "{date_start}", "--end", "{today}"]


  # ----------------------------------------------------------
  # 阶段 19：同花顺热榜（盘中 + 收盘后每15分钟更新）
  #   拉取热股/ETF/可转债/行业板块/概念板块/期货/港股/热基/美股
  #   共9种类型的当前最新热榜快照（is_new=Y）
  #   每次调用写入以 rank_time 为标识的一批快照行，安全可重跑
  #
  #   取某日最新热榜查询示例：
  #     SELECT * FROM hot_list_ths
  #     WHERE trade_date='2026-03-23' AND data_type='热股'
  #       AND rank_time = (
  #         SELECT MAX(rank_time) FROM hot_list_ths
  #         WHERE trade_date='2026-03-23' AND data_type='热股'
  #       )
  #     ORDER BY rank;
  #
  #   cron: 工作日 9:00~22:00 每15分钟（覆盖盘中+盘后+22点收录）
  #   补拉历史某日全量：
  #     python pipeline.py --table hot_list_ths --date 20260323
  # ----------------------------------------------------------
  - name: 同花顺热榜
    cron: "*/15 9-22 * * 1-5"
    only_on: [weekday]
    tasks:
      - name: hot_list_ths
        cmd: ["--table", "hot_list_ths", "--start", "{date_start}", "--end", "{today}"]
